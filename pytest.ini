[pytest]
# Configuration pytest pour CuRobo ROS

# Dossiers de tests
testpaths = test

# Pattern pour découvrir les tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marqueurs personnalisés
markers =
    integration: Tests d'intégration (deselect with '-m "not integration"')
    e2e: Tests end-to-end complets
    slow: Tests lents (>30s) (deselect with '-m "not slow"')
    perception: Tests de perception et caméra
    strategies: Tests de stratégies robot
    stress: Tests de stress et performance
    robustness: Tests de robustesse et recovery
    requires_rosbag: Tests nécessitant des rosbags (deselect with '-m "not requires_rosbag"')
    hardware: Tests nécessitant hardware réel (deselect with '-m "not hardware"')

# Options par défaut
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    # --cov=curobo_ros
    # --cov-report=term-missing
    # --cov-report=html

# Timeout par défaut (secondes)
timeout = 300

# Configuration de log
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = test_output.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Ignorer warnings spécifiques
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Configuration pour pytest-timeout
timeout_method = thread

# Découverte de tests
norecursedirs = .git .tox build dist *.egg install

# Chemins Python
pythonpath = .

# Ordre d'exécution (optionnel, nécessite pytest-order)
# console_output_style = progress
