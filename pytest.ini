[pytest]
# Configuration pytest pour curobo_ros

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test categorization
markers =
    fk: Forward kinematics tests
    ik: Inverse kinematics tests
    trajectory: Trajectory generation tests
    obstacles: Obstacle management tests
    segmentation: Robot segmentation tests
    unified_planner: Unified planner tests
    mpc: MPC planner tests
    switching: Planner switching tests
    pipeline: End-to-end pipeline tests
    slow: Slow running tests
    integration: Integration tests

# Timeout for tests (in seconds)
timeout = 60

# Coverage options (if pytest-cov is installed)
# Run with: pytest --cov=curobo_ros --cov-report=html
[coverage:run]
source = curobo_ros
omit =
    */test_*.py
    */tests/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
