[pytest]
# Configuration pytest pour curobo_ros - branche MPC

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers

markers =
    unified_planner: Tests du nœud unified_planner
    mpc: Tests du planner MPC
    classic: Tests du planner Classic
    switching: Tests changement de planner
    integration: Tests d'intégration

timeout = 60
