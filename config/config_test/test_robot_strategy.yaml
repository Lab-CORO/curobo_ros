# Test robot strategy services

package: curobo_ros
environment:
  launch:
    - package: curobo_ros
      executable: gen_traj.launch.py
      name: gen_traj
  startup_delay: 10.0

tests:
  - name: "01 Get robot strategies"
    service: "/unified_planner/get_robot_strategies"
    type: curobo_msgs/srv/GetRobotStrategies
    data: {}
    expect: {success: True}

  - name: "02 Set strategy emulator"
    service: "/unified_planner/set_robot_strategy"
    type: curobo_msgs/srv/SetRobotStrategy
    data: {robot_strategy: 1}
    expect: {success: True}

  - name: "03 Set strategy doosan"
    service: "/unified_planner/set_robot_strategy"
    type: curobo_msgs/srv/SetRobotStrategy
    data: {robot_strategy: 0}
    expect: {success: True}
