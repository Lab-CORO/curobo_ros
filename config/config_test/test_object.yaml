# Test to add and remove an object from curobo

package: curobo_ros
environment:
  launch:
      - package: curobo_ros
        executable: gen_traj.launch.py
        name: gen_traj
  startup_delay: 10.0


tests:
  - name: "Add object"
    service: "/unified_planner/add_object"
    type: curobo_msgs/srv/AddObject
    data: {type: 0, 
            name: "cube", 
            mesh_file_path: "", 
            pose: {position: {x: 0.0, y: 0.0, z: 0.0}, 
                  orientation: {x: 0.0, y: 0.0, z: 0.0, w: 0.0}},
            dimensions: {x: 0.5, y: 0.5, z: 0.5},
            color: {r: 0.0, a: 0.0}
          }
    expect: {success: True,
             message: 'Object cube added successfully'}

  - name: "Remove object"
    service: "/unified_planner/remove_object"
    type: curobo_msgs/srv/RemoveObject
    data: {name: "cube"} 
    expect: {success: True,
             message: "Object 'cube' removed successfully (cuboid)"}

